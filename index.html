<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang chủ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            height: 100%;
            overflow: hidden;
        }
        .bg-image {
            /* Thay link ảnh nữ công an của bạn vào đây */
            background-image: url('1772682893070.png');
            height: 100%;
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            /* Giúp trang web tải mượt hơn */
            background-color: #06402B; 
        }
    </style>
</head>
<body>
    <div class="bg-image"></div>
</body>
</html>
